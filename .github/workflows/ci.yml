name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  # backend
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Install Ruff
        run: uv add --dev ruff

      - name: Lint
        run: uv run ruff check .

